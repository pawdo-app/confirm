<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawDo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FFF8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #2D2D2D;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 48px 32px;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin: 0 0 12px; color: #FF6B6B; }
    h1.error { color: #E53935; }
    p { font-size: 16px; line-height: 1.5; color: #666; margin: 0 0 12px; }
    .hint { font-size: 14px; color: #999; margin-top: 16px; }
    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #E0D5CA;
      border-radius: 12px;
      margin: 8px 0;
      box-sizing: border-box;
      outline: none;
    }
    input:focus { border-color: #FF6B6B; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: #FF6B6B;
      color: white;
      border: none;
      border-radius: 12px;
      margin-top: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { color: #E53935; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script>
    const SUPABASE_URL = "https://fxvftddlfgromvpvzckv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4dmZ0ZGRsZmdyb212cHZ6Y2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODkyMTMsImV4cCI6MjA5MTc2NTIxM30.aApGeK-hQjOLlLrBLDZEth4OoovG3vFPortd8G1ELE0";

    function parseParams() {
      const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
      const query = window.location.search.startsWith("?") ? window.location.search.slice(1) : "";
      return new URLSearchParams(hash || query);
    }

    const params = parseParams();
    const card = document.getElementById("card");

    function renderError() {
      card.innerHTML = `
        <div class="emoji">⚠️</div>
        <h1 class="error">Link invalid or expired</h1>
        <p>This link is no longer valid. Please return to PawDo and request a new one.</p>
        <p class="hint">Reset links expire after about an hour.</p>
      `;
    }

    function renderSuccess() {
      card.innerHTML = `
        <div class="emoji">🐾✅</div>
        <h1>Your email has been verified!</h1>
        <p>You can now log in to PawDo.</p>
        <p class="hint">Close this page and return to the app.</p>
      `;
    }

    function renderUpdated() {
      card.innerHTML = `
        <div class="emoji">🐾✅</div>
        <h1>Password updated!</h1>
        <p>You can now log in to PawDo with your new password.</p>
        <p class="hint">Close this page and return to the app.</p>
      `;
    }

    async function renderResetForm() {
      card.innerHTML = `
        <div class="emoji">🔑</div>
        <h1>Set new password</h1>
        <p>Enter your new password below.</p>
        <input id="pw1" type="password" placeholder="New password (min 6 characters)" />
        <input id="pw2" type="password" placeholder="Confirm password" />
        <div id="err" class="error-msg"></div>
        <button id="submit">Update password</button>
      `;

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { flowType: 'pkce', detectSessionInUrl: false }
      });

      const code = params.get("code");
      const accessToken = params.get("access_token");
      const refreshToken = params.get("refresh_token");

      if (code) {
        const { error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) {
          card.innerHTML = `
            <div class="emoji">⚠️</div>
            <h1 class="error">Link invalid or expired</h1>
            <p>This link is no longer valid. Please return to PawDo and request a new one.</p>
            <p class="hint">Reset links expire after about an hour.</p>
          `;
          return;
        }
      } else if (accessToken && refreshToken) {
        await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      }

      document.getElementById("submit").onclick = async () => {
        const pw1 = document.getElementById("pw1").value;
        const pw2 = document.getElementById("pw2").value;
        const errEl = document.getElementById("err");
        const btn = document.getElementById("submit");

        errEl.textContent = "";
        if (pw1.length < 6) { errEl.textContent = "Password must be at least 6 characters"; return; }
        if (pw1 !== pw2) { errEl.textContent = "Passwords do not match"; return; }

        btn.disabled = true;
        const { error } = await supabase.auth.updateUser({ password: pw1 });
        if (error) {
          errEl.textContent = error.message;
          btn.disabled = false;
        } else {
          renderUpdated();
        }
      };
    }

    if (params.get("error") || params.get("error_code")) {
      renderError();
    } else if (params.get("code") || params.get("type") === "recovery" || params.get("access_token")) {
      renderResetForm();
    } else {
      renderSuccess();
    }
  </script>
</body>
</html>
